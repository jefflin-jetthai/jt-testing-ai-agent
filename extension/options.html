<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>JT Testing AI Agent — 設定</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <style>
      body { padding: 20px; max-width: 560px; }
      .field { margin-bottom: 16px; }
      .field label { display: block; margin-bottom: 4px; color: var(--fg); }
      .field input { width: 100%; }
      .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
      #status { margin-left: 10px; }
    </style>
  </head>
  <body>
    <h1>JT Testing AI Agent — 設定</h1>

    <div class="field">
      <label for="notion-token">Notion Integration Token</label>
      <input id="notion-token" type="password" placeholder="secret_xxx 或 ntn_xxx" />
      <div class="hint">
        在 notion.so/my-integrations 建立 internal integration，並把測試案例頁面分享給它。
      </div>
    </div>

    <div class="field">
      <label for="at-repo-path">automatic-testing 專案路徑</label>
      <div style="display: flex; gap: 8px">
        <input id="at-repo-path" type="text" placeholder="例如 /Users/you/gitProject/automatic-testing" />
        <button id="pick-at-repo" style="background: #3a3a3a; white-space: nowrap">選取…</button>
      </div>
      <div class="hint">
        bridge 會用此路徑跑 pytest / git / 套用測試規範。儲存後於連線時送給 bridge，
        需按 side panel「停止 bridge」再「連線」套用。留空則用 bridge 預設。
      </div>
    </div>

    <button id="save">儲存</button>
    <span id="status" class="muted small"></span>

    <script type="module" src="options.js"></script>
  </body>
</html>
